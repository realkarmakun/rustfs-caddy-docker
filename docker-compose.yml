services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs-server
    security_opt:
      - "no-new-privileges:true"
    environment:
      RUSTFS_VOLUMES: /data/rustfs
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "https://${RUSTFS_CONSOLE_DOMAIN}"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?Set RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?Set RUSTFS_SECRET_KEY}
      RUSTFS_OBS_LOGGER_LEVEL: info
    volumes:
      - ./data/rustfs:/data
      - ./logs:/app/logs
    networks:
      - rustfs-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    container_name: rustfs-caddy
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      RUSTFS_S3_DOMAIN: ${RUSTFS_S3_DOMAIN}
      RUSTFS_CONSOLE_DOMAIN: ${RUSTFS_CONSOLE_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL to your real email address}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy-config:/config
    networks:
      - rustfs-network
    restart: unless-stopped
    depends_on:
      rustfs:
        condition: service_healthy

networks:
  rustfs-network:
    driver: bridge
